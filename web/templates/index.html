<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ 足球比赛预测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.plot.ly/plotly-latest.min.js"></link>
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-futbol"></i> 足球比赛预测系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#dashboard">仪表盘</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#teams">球队</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#predict">比赛预测</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#statistics">统计数据</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid py-4">
        <!-- Dashboard Section -->
        <section id="dashboard" class="mb-5">
            <div class="row">
                <div class="col-md-12">
                    <h2 class="mb-4"><i class="fas fa-chart-line"></i> 仪表盘</h2>
                </div>
            </div>
            
            <!-- Key Metrics -->
            <div class="row mb-4" id="metrics">
                <div class="col-md-3">
                    <div class="metric-card">
                        <div class="metric-value" id="total-matches">-</div>
                        <div class="metric-label">总比赛数</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="metric-card">
                        <div class="metric-value" id="total-teams">-</div>
                        <div class="metric-label">球队总数</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="metric-card">
                        <div class="metric-value" id="avg-goals">-</div>
                        <div class="metric-label">平均进球</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="metric-card">
                        <div class="metric-value" id="home-win-rate">-</div>
                        <div class="metric-label">主场胜率</div>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <i class="fas fa-trophy"></i> 球队排名 (Top 10)
                        </div>
                        <div class="card-body">
                            <div id="teams-chart" style="height: 400px;"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-header bg-success text-white">
                            <i class="fas fa-chart-pie"></i> 比赛结果分布
                        </div>
                        <div class="card-body">
                            <div id="results-chart" style="height: 400px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Teams Section -->
        <section id="teams" class="mb-5">
            <div class="row mb-4">
                <div class="col-md-12">
                    <h2><i class="fas fa-shield-alt"></i> 球队排名</h2>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-striped table-hover" id="teams-table">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>排名</th>
                                            <th>球队</th>
                                            <th>场次</th>
                                            <th>胜</th>
                                            <th>平</th>
                                            <th>负</th>
                                            <th>进球</th>
                                            <th>失球</th>
                                            <th>球差</th>
                                            <th>积分</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="teams-list">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Prediction Section -->
        <section id="predict" class="mb-5">
            <div class="row mb-4">
                <div class="col-md-12">
                    <h2><i class="fas fa-crystal-ball"></i> 比赛预测</h2>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-8 offset-md-2">
                    <div class="card">
                        <div class="card-body">
                            <form id="prediction-form">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">主队</label>
                                        <select class="form-select" id="team1-select" required>
                                            <option value="">选择球队...</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">客队</label>
                                        <select class="form-select" id="team2-select" required>
                                            <option value="">选择球队...</option>
                                        </select>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 btn-lg">
                                    <i class="fas fa-magic"></i> 预测比赛结果
                                </button>
                            </form>

                            <!-- Prediction Results -->
                            <div id="prediction-results" class="mt-4" style="display: none;">
                                <h4 class="mb-3">预测结果</h4>
                                <div class="row" id="prediction-cards">
                                </div>
                                
                                <div class="row mt-3">
                                    <div class="col-md-6">
                                        <div class="card bg-light">
                                            <div class="card-body">
                                                <h6>主队预期进球</h6>
                                                <h3 id="expected-goals-1" class="text-primary">-</h3>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="card bg-light">
                                            <div class="card-body">
                                                <h6>客队预期进球</h6>
                                                <h3 id="expected-goals-2" class="text-danger">-</h3>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Statistics Section -->
        <section id="statistics" class="mb-5">
            <div class="row mb-4">
                <div class="col-md-12">
                    <h2><i class="fas fa-chart-bar"></i> 统计数据</h2>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h5 class="card-title"><i class="fas fa-home"></i> 主场胜</h5>
                            <h3 id="stat-home-wins" class="text-success">-</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h5 class="card-title"><i class="fas fa-handshake"></i> 平局</h5>
                            <h3 id="stat-draws" class="text-warning">-</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h5 class="card-title"><i class="fas fa-away"></i> 客场胜</h5>
                            <h3 id="stat-away-wins" class="text-danger">-</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header bg-info text-white">
                            <i class="fas fa-history"></i> 最近比赛
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-striped" id="matches-table">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>日期</th>
                                            <th>主队</th>
                                            <th>比分</th>
                                            <th>客队</th>
                                            <th>结果</th>
                                        </tr>
                                    </thead>
                                    <tbody id="matches-list">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">⚽ 足球比赛预测系统 v1.0 | © 2024 All Rights Reserved</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
